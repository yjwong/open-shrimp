name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sdist:
    name: Build sdists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build review app frontend
        working-directory: web/review-app
        run: npm ci && npm run build

      - name: Build open-udang sdist
        run: uv build --sdist

      - name: Build moonshine-stt sdist
        working-directory: moonshine-stt
        run: uv build --sdist

      - name: Upload open-udang sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist-openudang
          path: dist/*.tar.gz

      - name: Upload moonshine-stt sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist-moonshine-stt
          path: moonshine-stt/dist/*.tar.gz

  build-binary:
    name: Build ${{ matrix.artifact }}
    needs: build-sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # open-udang
          - os: ubuntu-latest
            artifact: openudang-linux-x86_64
            sdist_artifact: sdist-openudang
            exec_code: "from open_udang.main import main; main()"
          - os: ubuntu-24.04-arm
            artifact: openudang-linux-aarch64
            sdist_artifact: sdist-openudang
            exec_code: "from open_udang.main import main; main()"
          - os: macos-latest
            artifact: openudang-macos-aarch64
            sdist_artifact: sdist-openudang
            exec_code: "from open_udang.main import main; main()"
          # moonshine-stt
          - os: ubuntu-latest
            artifact: moonshine-stt-linux-x86_64
            sdist_artifact: sdist-moonshine-stt
            exec_code: "from moonshine_stt.main import main; main()"
          - os: ubuntu-24.04-arm
            artifact: moonshine-stt-linux-aarch64
            sdist_artifact: sdist-moonshine-stt
            exec_code: "from moonshine_stt.main import main; main()"
          - os: macos-latest
            artifact: moonshine-stt-macos-aarch64
            sdist_artifact: sdist-moonshine-stt
            exec_code: "from moonshine_stt.main import main; main()"

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.sdist_artifact }}
          path: dist

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-pyapp-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pyapp-

      - name: Get sdist filename
        id: sdist
        run: echo "filename=$(realpath dist/*.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Build with PyApp
        env:
          PYAPP_PROJECT_PATH: ${{ steps.sdist.outputs.filename }}
          PYAPP_PYTHON_VERSION: "3.11"
          PYAPP_EXEC_CODE: ${{ matrix.exec_code }}
          PYAPP_DISTRIBUTION_EMBED: "1"
        run: cargo install pyapp --force --root dist/pyapp

      - name: Rename binary
        run: mv dist/pyapp/bin/pyapp dist/${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/openudang-*
            artifacts/moonshine-stt-*
            artifacts/*.tar.gz
