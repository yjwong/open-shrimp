# OpenShrimp configuration
# Copy to ~/.config/openshrimp/config.yaml and fill in your values

telegram:
  token: "YOUR_BOT_TOKEN"

allowed_users:
  - 123456789  # Your Telegram user ID

contexts:
  default:
    directory: /home/you/Documents/your-project
    description: "Default context"
    # model: sonnet  # Optional. Short names: sonnet, opus, haiku. Omit to use CLI default.
    # effort: medium  # Optional thinking effort level: low, medium, high, xhigh, max. Omit for CLI default.
    allowed_tools:
      - LSP
      - AskUserQuestion
      # Note: Read, Glob, Grep, Write, and Edit are intentionally NOT listed
      # here. They are handled by OpenShrimp's path-scoped approval:
      #
      # - Read, Glob, Grep: auto-approved when within the context directory.
      # - Edit, Write: always require manual approval via Telegram, even
      #   within the context directory. The approval prompt offers an
      #   "Accept all edits" button to auto-approve future Edit/Write calls
      #   for the rest of the session (cleared on /clear or context switch).
      #
      # Paths outside the context directory always require manual approval.
      # This prevents the agent from silently accessing arbitrary files
      # (e.g. ~/.ssh/*, config secrets).
      #
      # If you add them to allowed_tools, they bypass the path check entirely
      # and the agent can access any file the process can read.
      #
      # Patterns are supported — these are passed to the Claude CLI as --allowedTools
      # - "Bash(git *)"        # allow all git commands
    # disallowed_tools:
    #   - WebSearch            # remove tools from the agent entirely
    #   - WebFetch
    #   # On the claude_sdk backend these map to --disallowedTools; on the
    #   # opencode backend they become deny rules that also hide the tool
    #   # from the model. Accepts hooks-style (WebFetch), opencode wire
    #   # (webfetch), and MCP (mcp__server__tool) names.
    # additional_directories:
    #   - /home/you/Documents/shared-lib  # Extra dirs the agent can access
    #   - /home/you/Documents/api-service
    #   # These are passed to the SDK as add_dirs (equivalent to --add-dir).
    #   # Path-scoped auto-approval (Read, Glob, Grep) extends to these dirs.
    #   # The project's .claude/settings.json additionalDirectories are also
    #   # respected via setting_sources=["project"] (inherited by default).
    # default_for_chats:
    #   - -1001234567890  # Sets initial context for this group chat
    # locked_for_chats:
    #   - -1001234567890  # Locks this group chat to this context (cannot switch)
    # sandbox:                     # Run the Claude CLI in an isolated sandbox.
    #   backend: docker            # "docker" (Linux), "libvirt" (Linux VM), or "lima" (macOS VM)
    #                              # Provides strong filesystem isolation — the agent
    #                              # can only access the project directory and its
    #                              # own session storage.
    #   docker_in_docker: true     # Enable rootless Docker inside the container.
    #                              # The agent can run docker build/run/compose etc.
    #                              # Adds --cap-add SYS_ADMIN (reduced isolation).
    #   dockerfile: /path/to/Dockerfile.claude  # Custom Dockerfile for this context.
    #                              # Use to install dev tools (Go, Node, Rust, etc.).
    #                              # Should typically FROM openshrimp-claude:latest.
    #                              # Build context is the Dockerfile's parent dir.
    #                              # The Claude CLI binary is copied in as "claude"
    #                              # (available via CLAUDE_CLI build arg).
    #   allow_host_escape: false   # Sudo mode. Exposes `host_bash` and
    #                              # `host_monitor` MCP tools that run shell
    #                              # commands on the HOST (outside the sandbox).
    #                              # host_bash is one-shot; host_monitor streams
    #                              # each stdout line of a long-running command
    #                              # back as an event. Every arm prompts the user
    #                              # for approval via Telegram and auto-denies
    #                              # after 30 seconds. All arms/stops are logged
    #                              # to `sudo.log` in the OpenShrimp data
    #                              # directory (platform-specific; per-instance
    #                              # when instance_name is set).
    #                              # Use sparingly — defeats the sandbox boundary.
    #   computer_use: true         # Enable GUI interaction (computer use).
    #                              # Runs a desktop environment inside the sandbox.
    #                              # Claude can take screenshots, click, type, scroll,
    #                              # and switch windows via MCP tools. A VNC server
    #                              # is exposed for observability (check /status).
    #   phone_use: true            # Enable Android "phone use" (libvirt only).
    #                              # Runs Waydroid (Android in an LXC container) inside
    #                              # the guest VM; Claude drives it via phone_shell /
    #                              # phone_screenshot / phone_install_apk MCP tools and
    #                              # you watch it live with /phone (a /vnc alias).
    #                              # Implies computer_use (needs the labwc desktop) and
    #                              # auto-enables virgl for hardware-accelerated GLES.
    #                              # The Android system images (~2.4 GB) download on
    #                              # first boot and survive VM rebuilds. Bump `memory`
    #                              # to >= 6144 — Android + the desktop want headroom.
    #                              # Requires the guest kernel's binder module (Ubuntu
    #                              # ships it in linux-modules-extra; installed for you).
    #   android:                   # Optional phone_use tuning:
    #     image_type: VANILLA      #   VANILLA (no Google apps) or GAPPS
    #     resolution: 720x1280     #   WIDTHxHEIGHT applied via `wm size`
    #     dpi: 320                 #   density applied via `wm density`
    #     gpu: virgl               #   virgl (host-GPU GLES, default) or software
    #                              #   (llvmpipe fallback for GPU-less hosts; slow)
    #   # Lima backend (macOS only) — full VM isolation via Apple Virtualization.framework:
    #   # backend: lima
    #   # memory: 4096              # VM memory in MB (default: 2048)
    #   # cpus: 4                   # VM CPU cores (default: 2)
    #   # disk_size: 20             # VM disk in GB (default: 20)
    #   # provision: |              # Shell script run on first boot
    #   #   apt-get install -y nodejs npm
    # mcp:                          # Per-context MCP server overlay (opencode only).
    #                               # Honoured by `backend: opencode`; ignored by the
    #                               # claude backend, which reads MCP servers from
    #                               # `~/.claude.json` (user-scope + per-project).
    #   my-stdio-tool:
    #     type: stdio
    #     command: my-tool
    #     args: ["--flag"]
    #     env:
    #       FOO: bar
    # backend: opencode             # Override the top-level `backend:` for this
    #                               # context only.  Same values as the top-level key
    #                               # (claude_sdk / opencode).  Omit to inherit.

default_context: default

# Agent backend (optional, top-level).  Selects which agent runtime drives
# every context.  Defaults to "claude_sdk" when omitted.
#
#   backend: claude_sdk   # (default) the Claude Agent SDK.
#   backend: opencode     # OpenCode (sst/opencode) via its HTTP serve API.
#
# OpenCode preconditions:
#   * Every context's `model:` MUST be provider-qualified as `provider/model`
#     (OpenCode has no implicit default provider), e.g.:
#         model: openai/gpt-5.5
#         model: anthropic/claude-opus-4-7
#         model: google/gemini-2.5-pro
#     An unqualified model fails fast at startup.
#   * The host must be pre-authenticated out-of-band — run `opencode auth login`
#     so `~/.local/share/opencode/auth.json` exists.
#   * The `opencode` binary must be discoverable (`$OPENCODE_BIN`, then
#     `~/.opencode/bin/opencode`, then `PATH`); checked at startup.
# backend: claude_sdk

# Instance name (required when running multiple OpenShrimp instances on the
# same host).  Isolates the database, sandbox state, Docker images, Lima VMs,
# and build logs so instances don't collide.  When omitted (single-instance),
# all paths use the legacy layout.
# instance_name: mybot

# Review Mini App settings (optional)
# review:
#   host: "127.0.0.1"   # HTTP server bind address
#   port: 8080           # HTTP server port
#   public_url: "https://your-domain.com"  # Public URL for Mini App (behind reverse proxy)
#   tunnel: cloudflared  # Auto-start a cloudflared quick tunnel (free, no account needed)
#                        # Downloads cloudflared automatically if not installed.
#                        # Sets public_url from the assigned trycloudflare.com URL.
#                        # Ignored if public_url is already set.

# Android companion settings (optional)
# android_companion:
#   push_provider: fcm
#   # Firebase Cloud Messaging HTTP v1 credentials. You may use either config
#   # fields or environment variables:
#   #   OPENSHRIMP_FCM_PROJECT_ID
#   #   OPENSHRIMP_FCM_SERVICE_ACCOUNT_FILE
#   #   OPENSHRIMP_FCM_SERVICE_ACCOUNT_JSON
#   fcm_project_id: your-firebase-project-id
#   fcm_service_account_file: /path/to/firebase-service-account.json

# Inbound events (optional).  External sources deliver events into dedicated
# forum topics — one topic per source, auto-created on first event (e.g.
# "📥 lark").  Events are posted as inert messages; no agent runs on receipt.
# To act on an event, tap its "▶️ Pick up" button: a context picker opens and
# the event is handed off to a dedicated new topic bound to the chosen
# context.  The agent's first turn references the event by id only; it
# fetches the provider-delivered content itself via the read_inbound_event
# tool (untrusted content never enters a prompt).
# events:
#   chat_id: -1001234567890        # forum chat where 📥 topics are created
#   sources:
#     - name: tg-intake
#       type: telegram
#       token: "123456:ABC..."     # a SECOND bot token (not telegram.token)
#       allowed_chats: [-100987654321, 42424242]  # messages from other chats are ignored
#       require_mention: true      # only ingest group messages that address the
#                                  # bot (@mention, /cmd@bot, or text-mention);
#                                  # DMs to the bot are always ingested. Default
#                                  # false (ingest everything from allowed_chats).
#       context: default           # pre-selected (★) default in the pick-up
#                                  # context picker; omit for default_context
#       pickup: true               # set false to keep this source purely
#                                  # inert (no pick-up buttons)
#     - name: lark                 # requires: uv sync --extra lark
#       type: lark
#       app_id: "cli_..."
#       app_secret: "..."
#       domain: lark               # "lark" (open.larksuite.com, international)
#                                  # or "feishu" (open.feishu.cn, China).
#                                  # Default: feishu.
#       require_mention: true      # only ingest group messages that @-mention the
#                                  # bot; direct (p2p) chats are always ingested.
#                                  # Default false (ingest every message).
#       trusted_senders:           # platform-stable sender ids (Lark open_id /
#         - ou_abc123              # Telegram numeric user id as a string). A
#                                  # message from one of these that carries a
#                                  # /context:<name> directive auto-picks-up into
#                                  # that context — no button tap. Trust is keyed
#                                  # on the id, never the display name. Requires
#                                  # pickup (auto-pickup is a form of pickup).
#       # Lark app must use Event Subscription in "Long Connection" (WebSocket)
#       # mode and subscribe to im.message.receive_v1. Add the bot to the
#       # target chat and release an app version for it to take effect.

# Optional: meeting transcription (Android companion). The phone records and
# transcribes meetings fully on-device, then uploads the diarized transcript
# TEXT (audio never leaves the phone). The host generates Claude meeting
# notes and delivers notes + transcript into a "📝 Meetings" forum topic,
# then notifies the phone via FCM.
# meetings:
#   chat_id: -1001234567890   # forum chat where the Meetings topic is created
#   topic: Meetings           # forum topic name (default: Meetings)
#   notes_context: default    # context whose model/cwd generates the notes;
#                             # omit for default_context (session is tool-less)
